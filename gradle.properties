org.gradle.jvmargs=-Xmx2048m -Dfile.encoding=UTF-8
org.gradle.caching=true
android.useAndroidX=true
kotlin.code.style=official
android.nonTransitiveRClass=true
# AGP 9 enables built-in Kotlin + the new DSL by default. Keep the standalone Kotlin Gradle
# plugin (so the Kotlin and Compose-compiler plugin versions stay explicitly pinned together)
# by opting out of both. newDsl=false is an AGP-9 compat shim (removed in AGP 10) — the future
# migration is to AGP built-in Kotlin.
android.builtInKotlin=false
android.newDsl=false
